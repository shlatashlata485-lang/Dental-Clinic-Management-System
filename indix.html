                                                <p className="text-[11px] text-slate-400 mt-0.5">انقر فوق السن الرسومي لتعديل وتغيير حالته الطبية بالألوان ديناميكياً</p>
                                            </div>

                                            <div className="relative w-full overflow-x-auto flex justify-center bg-white dark:bg-slate-950 p-2 rounded-2xl border border-slate-100 dark:border-slate-800">
                                                <svg width="530" height="540" viewBox="0 0 530 540" className="select-none mx-auto">
                                                    <line x1="262" y1="20" x2="262" y2="510" stroke="#94a3b8" strokeWidth="1.5" strokeDasharray="3 3" />
                                                    <line x1="20" y1="265" x2="510" y2="265" stroke="#475569" strokeWidth="2" />
                                                    <g id="upper-teeth">
                                                        {upperTeethSpecs.map(t => (
                                                            <g key={t.num} onClick={() => handleToothClick(t.num)}>
                                                                <ellipse cx={t.cx} cy={t.cy} rx={t.rx} ry={t.ry} fill={getToothColorHex(currentTeethState[t.num] || "سليم")} stroke="#334155" strokeWidth="1.5" className="tooth-path" />
                                                                <text x={t.labelX} y={t.labelY} textAnchor="middle" className="fill-slate-700 dark:fill-slate-300 font-mono text-[11px] font-bold" pointerEvents="none">{t.num}</text>
                                                            </g>
                                                        ))}
                                                    </g>
                                                    <g id="lower-teeth">
                                                        {lowerTeethSpecs.map(t => (
                                                            <g key={t.num} onClick={() => handleToothClick(t.num)}>
                                                                <ellipse cx={t.cx} cy={t.cy} rx={t.rx} ry={t.ry} fill={getToothColorHex(currentTeethState[t.num] || "سليم")} stroke="#334155" strokeWidth="1.5" className="tooth-path" />
                                                                <text x={t.labelX} y={t.labelY} textAnchor="middle" className="fill-slate-700 dark:fill-slate-300 font-mono text-[11px] font-bold" pointerEvents="none">{t.num}</text>
                                                            </g>
                                                        ))}
                                                    </g>
                                                </svg>
                                            </div>

                                            <div className="grid grid-cols-5 gap-1.5 text-[10px] text-center pt-2 font-medium">
                                                <div className="p-1.5 bg-slate-100 dark:bg-slate-800 text-slate-800 rounded">سليم</div>
                                                <div className="p-1.5 bg-red-500 text-white rounded">تسوس</div>
                                                <div className="p-1.5 bg-emerald-500 text-white rounded">حشو</div>
                                                <div className="p-1.5 bg-gray-600 text-white rounded">خلع</div>
                                                <div className="p-1.5 bg-amber-500 text-white rounded">عصب</div>
                                                <div className="p-1.5 bg-blue-500 text-white rounded">زراعة 🦷</div>
                                                <div className="p-1.5 bg-purple-500 text-white rounded">تركيب 👑</div>
                                                <div className="p-1.5 bg-cyan-400 text-white rounded">تبييض ✨</div>
                                                <div className="p-1.5 bg-pink-500 text-white rounded">تقويم ⛓️</div>
                                                <div className="p-1.5 bg-red-800 text-white rounded">جراحة 🔪</div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* قسم: الحسابات والفواتير المالية */}
                                {currentTab === "billing" && (
                                    <div className="bg-white dark:bg-slate-900 rounded-2xl border shadow-sm overflow-hidden">
                                        <div className="p-5 border-b"><h3 className="font-bold text-lg dark:text-white">الفواتير والمستحقات والذمم المالية الكلية</h3></div>
                                        <table className="w-full text-right text-sm">
                                            <thead className="bg-slate-50 dark:bg-slate-800 text-slate-400 text-xs border-b">
                                                <tr>
                                                    <th className="p-4">اسم المريض</th>
                                                    <th className="p-4">عدد الكشوفات</th>
                                                    <th className="p-4">إجمالي المطلوب</th>
                                                    <th className="p-4">إجمالي المدفوع</th>
                                                    <th className="p-4">الباقي بالخارج على المريض</th>
                                                    <th className="p-4 text-center">إدارة الأقساط والتحصيل</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y text-slate-700 dark:text-slate-300">
                                                {filteredPatients.length === 0 ? (
                                                    <tr><td colSpan="6" className="p-6 text-center text-slate-400">لا توجد سجلات مالية مسجلة.</td></tr>
                                                ) : filteredPatients.map(p => {
                                                    const patientTotal = p.visits?.reduce((sum, v) => sum + (parseFloat(v.totalAmount) || 0), 0) || 0;
                                                    const patientPaid = p.visits?.reduce((sum, v) => sum + (parseFloat(v.paidAmount) || 0), 0) || 0;
                                                    const patientRemaining = p.visits?.reduce((sum, v) => sum + (parseFloat(v.remainingAmount) || 0), 0) || 0;
                                                    return (
                                                        <tr key={p.id}>
                                                            <td className="p-4 font-semibold">{p.name}</td>
                                                            <td className="p-4">{p.visits?.length || 0} كشوفات</td>
                                                            <td className="p-4">{patientTotal} ج.م</td>
                                                            <td className="p-4 text-emerald-600">+{patientPaid} ج.م</td>
                                                            <td className="p-4 text-red-500 font-bold">{patientRemaining} ج.م</td>
                                                            <td className="p-4 text-center">
                                                                <button onClick={() => { setSelectedPatient(p); setCurrentTab("patients"); }} className="text-xs bg-slate-100 hover:bg-blue-50 text-slate-700 hover:text-blue-600 px-3 py-1 rounded-lg">إدارة الأقساط والتواريخ</button>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {/* قسم: مخزن ومستلزمات المواد */}
                                {currentTab === "inventory" && (
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center bg-white dark:bg-slate-900 p-4 rounded-2xl border shadow-sm">
                                            <h3 className="font-bold text-base dark:text-white">مستودع ومخزن المستلزمات الطبية</h3>
                                            <button onClick={() => setShowAddStockModal(true)} className="bg-blue-600 text-white text-xs font-medium px-4 py-2.5 rounded-xl"><i data-lucide="plus-circle" className="w-4 h-4 inline pl-1"></i> إضافة صنف طبي جديد</button>
                                        </div>
                                        {showAddStockModal && (
                                            <form onSubmit={handleAddNewStockItem} className="bg-slate-50 dark:bg-slate-800 p-5 rounded-2xl border grid grid-cols-1 sm:grid-cols-4 gap-4 items-end text-xs">
                                                <div><label className="block mb-1">اسم المستلزم *</label><input type="text" required value={newStockItem.name} onChange={(e) => setNewStockItem({...newStockItem, name: e.target.value})} className="w-full px-3 py-2 border rounded-xl dark:bg-slate-950 dark:text-white" /></div>
                                                <div><label className="block mb-1">الكمية *</label><input type="number" required value={newStockItem.quantity} onChange={(e) => setNewStockItem({...newStockItem, quantity: e.target.value})} className="w-full px-3 py-2 border rounded-xl dark:bg-slate-950 dark:text-white" /></div>
                                                <div><label className="block mb-1">حد التنبيه</label><input type="number" value={newStockItem.minAlert} onChange={(e) => setNewStockItem({...newStockItem, minAlert: e.target.value})} className="w-full px-3 py-2 border rounded-xl dark:bg-slate-950 dark:text-white" /></div>
                                                <div><label className="block mb-1">سعر الشراء *</label><input type="number" required value={newStockItem.buyPrice} onChange={(e) => setNewStockItem({...newStockItem, buyPrice: e.target.value})} className="w-full px-3 py-2 border rounded-xl dark:bg-slate-950 dark:text-white" /></div>
                                                <button type="submit" className="bg-emerald-600 text-white px-6 py-2 rounded-xl sm:col-span-4 justify-self-end">إدراج المادة</button>
                                            </form>
                                        )}
                                        <div className="bg-white dark:bg-slate-900 rounded-2xl border shadow-sm overflow-hidden">
                                            <table className="w-full text-right text-sm">
                                                <thead className="bg-slate-50 dark:bg-slate-800 text-slate-400 text-xs border-b">
                                                    <tr>
                                                        <th className="p-4">اسم المادة</th>
                                                        <th className="p-4">الكمية الحالية</th>
                                                        <th className="p-4">حد التنبيه</th>
                                                        <th className="p-4">سعر الشراء</th>
                                                        <th className="p-4 text-center">التحكم السريع في الكمية</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y text-slate-700 dark:text-slate-300">
                                                    {inventory.length === 0 ? (
                                                        <tr><td colSpan="5" className="p-6 text-center text-slate-400">لا توجد مواد في المخزن حالياً.</td></tr>
                                                    ) : inventory.map(item => (
                                                        <tr key={item.id}>
                                                            <td className="p-4 font-semibold">{item.name}</td>
                                                            <td className={`p-4 font-bold ${item.quantity <= item.minAlert ? 'text-red-500' : ''}`}>{item.quantity} وحدة</td>
                                                            <td className="p-4">{item.minAlert} وحدة</td>
                                                            <td className="p-4">{item.buyPrice} ج.م</td>
                                                            <td className="p-4 text-center flex justify-center gap-2">
                                                                <button onClick={() => handleQuickUpdateStock(item.id, 1)} className="bg-emerald-500 text-white w-8 h-8 rounded-lg font-bold flex items-center justify-center hover:bg-emerald-600">+</button>
                                                                <button onClick={() => handleQuickUpdateStock(item.id, -1)} className="bg-red-500 text-white w-8 h-8 rounded-lg font-bold flex items-center justify-center hover:bg-red-600">-</button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {/* قسم: الإعدادات والنسخ الاحتياطي */}
                                {currentTab === "settings" && (
                                    <div className="space-y-6 max-w-3xl">
                                        <div className="bg-white dark:bg-slate-900 p-6 rounded-2xl border shadow-sm grid grid-cols-1 md:grid-cols-3 gap-6 items-center">
                                            <div className="md:col-span-2 space-y-4">
                                                <h3 className="font-bold text-lg dark:text-white flex items-center gap-2">
                                                    <i data-lucide="sliders" className="text-blue-500"></i> إعدادات العيادة وكلمة المرور
                                                </h3>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                                                    <div><label className="block text-xs text-slate-500 mb-1">اسم العيادة</label><input type="text" value={settings.clinicName} onChange={(e) => setSettings({...settings, clinicName: e.target.value})} className="w-full px-3 py-2 border rounded-xl dark:bg-slate-800 dark:text-white" /></div>
                                                    <div><label className="block text-xs text-slate-500 mb-1">اسم الدكتور</label><input type="text" value={settings.doctorName} onChange={(e) => setSettings({...settings, doctorName: e.target.value})} className="w-full px-3 py-2 border rounded-xl dark:bg-slate-800 dark:text-white" /></div>
                                                    <div><label className="block text-xs text-slate-500 mb-1">رمز دخول المنظومة (الباسورد)</label><input type="password" value={settings.systemPass} onChange={(e) => setSettings({...settings, systemPass: e.target.value})} className="w-full px-3 py-2 border rounded-xl dark:bg-slate-800 dark:text-white" /></div>
                                                </div>

                                                <div className="pt-4 border-t space-y-2">
                                                    <span className="text-xs font-bold text-slate-700 dark:text-slate-300 block">💾 الأمان والنسخ الاحتياطي للبيانات:</span>
                                                    <div className="flex flex-wrap gap-2">
                                                        <button type="button" onClick={exportBackup} className="bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-4 py-2 rounded-xl flex items-center gap-1">
                                                            <i data-lucide="download" className="w-4 h-4"></i> تنزيل نسخة احتياطية (JSON)
                                                        </button>
                                                        <label className="bg-amber-500 hover:bg-amber-600 text-white text-xs font-medium px-4 py-2 rounded-xl flex items-center gap-1 cursor-pointer">
                                                            <i data-lucide="upload" className="w-4 h-4"></i> استعادة نسخة احتياطية
                                                            <input type="file" accept=".json" onChange={importBackup} className="hidden" />
                                                        </label>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="p-4 bg-gradient-to-br from-slate-900 to-slate-950 rounded-2xl border border-slate-800 text-center space-y-3 shadow-xl">
                                                <div className="relative mx-auto w-24 h-24 rounded-full border-2 border-emerald-500/30 overflow-hidden flex items-center justify-center bg-slate-900">
                                                    <div className="absolute inset-0 text-emerald-400 font-bold text-xs flex items-center justify-center">S H</div>
                                                </div>
                                                <div>
                                                    <p className="text-[10px] text-slate-500 uppercase tracking-wider font-semibold">تطوير وتصميم وتكامل</p>
                                                    <h4 className="text-sm font-bold text-white tracking-wide mt-0.5">SHLATA HUB</h4>
                                                    <span className="inline-block text-[9px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded-full mt-1.5 font-medium">الإصدار المطور الشامل v4.0</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
